# Default configuration for text2sql-rag Phase 1 (schema RAG on Spider).

spider:
  # Resolved from SPIDER_DATA_DIR env var when set; else relative path.
  data_dir: "./data/spider"

indexer:
  embedding_model: "BAAI/bge-small-en-v1.5"
  chroma_path: "./data/chroma_schema"
  collection_name: "spider_schema"
  batch_size: 32
  # Which database IDs to index; null = all found in tables.json
  db_id_filter: null

linker:
  top_k: 12
  # Prefer table-level hits vs column-level (both indexed)
  include_column_chunks: true

validator:
  dialect: "sqlite"

eval:
  enabled: true

generators:
  enabled: true
  provider: echo
  groq_model: "llama-3.1-70b-versatile"

fewshot:
  chroma_path: "./data/chroma_examples"
  collection_name: "spider_examples"
  json_file: "train.json"
  max_examples: 400
  batch_size: 64
